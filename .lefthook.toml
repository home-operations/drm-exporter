[[remotes]]
git_url = "https://github.com/home-operations/.github"
ref = "main"
configs = ["lefthook.common.toml"]

# Regenerate the chart's committed README + values.schema.json whenever their
# inputs change, and stage them. CI's helm-docs-check is the backstop.
[pre-commit.commands.helm-docs]
glob = [
  "charts/drm-exporter/Chart.yaml",
  "charts/drm-exporter/values.yaml",
  "charts/drm-exporter/README.md.gotmpl",
]
run = "mise run helm-docs && git add charts/drm-exporter/README.md charts/drm-exporter/values.schema.json"

# The generated chart README is a build artifact; keep the shared markdown
# formatter off it (staging only it would otherwise hand oxfmt an all-ignored
# set and fail the hook).
[pre-commit.commands.format-markdown]
exclude = ["charts/drm-exporter/README.md"]

# The generated values schema and the embedded Grafana dashboard are artifacts
# shipped verbatim; keep the shared JSON formatter off them.
[pre-commit.commands.format-json]
exclude = [
  "charts/drm-exporter/values.schema.json",
  "charts/drm-exporter/dashboards/*.json",
]

# Helm templates are Go-templated YAML (a `{{- if -}}` guard on line 1 is not
# valid standalone YAML), so they can never be fed to a YAML formatter. The
# `**/*.yaml` glob only matches nested files (e.g. templates/tests/), so list the
# top-level templates separately too.
[pre-commit.commands.format-yaml]
exclude = [
  "charts/drm-exporter/templates/*.yaml",
  "charts/drm-exporter/templates/**/*.yaml",
]

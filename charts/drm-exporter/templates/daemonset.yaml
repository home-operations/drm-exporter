apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "drm-exporter.fullname" . }}
  labels:
    {{- include "drm-exporter.labels" . | nindent 4 }}
  {{- with .Values.daemonsetAnnotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "drm-exporter.selectorLabels" . | nindent 6 }}
  {{- with .Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "drm-exporter.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "drm-exporter.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostAccess.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "drm-exporter.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DRM_EXPORTER_ADDRESS
              value: "0.0.0.0"
            - name: DRM_EXPORTER_PORT
              value: {{ .Values.config.port | quote }}
            - name: DRM_EXPORTER_INTERVAL_SECONDS
              value: {{ .Values.config.intervalSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
            {{- with .Values.config.devices }}
            - name: DRM_EXPORTER_DEVICES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ tpl (toString $value) $ | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.hostAccess.devDri }}
            - name: dev-dri
              mountPath: {{ .Values.hostAccess.devDri }}
            {{- end }}
            {{- if .Values.hostAccess.sys }}
            - name: sys
              mountPath: {{ .Values.hostAccess.sys }}
              readOnly: true
            {{- end }}
            {{- if .Values.hostAccess.devCpu }}
            - name: dev-cpu
              mountPath: {{ .Values.hostAccess.devCpu }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.hostAccess.devDri }}
        - name: dev-dri
          hostPath:
            path: {{ .Values.hostAccess.devDri }}
        {{- end }}
        {{- if .Values.hostAccess.sys }}
        - name: sys
          hostPath:
            path: {{ .Values.hostAccess.sys }}
            type: Directory
        {{- end }}
        {{- if .Values.hostAccess.devCpu }}
        - name: dev-cpu
          hostPath:
            path: {{ .Values.hostAccess.devCpu }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ tpl . $ }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

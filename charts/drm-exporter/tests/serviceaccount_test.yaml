suite: serviceaccount
templates:
  - serviceaccount.tpl
  - _helpers.tpl
tests:
  - it: is created by default with the token unmounted
    template: serviceaccount.tpl
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: is not created when serviceAccount.create is false
    template: serviceaccount.tpl
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honors a custom serviceAccount.name
    template: serviceaccount.tpl
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

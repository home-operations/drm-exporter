suite: service
templates:
  - service.tpl
  - _helpers.tpl
tests:
  - it: is a ClusterIP Service targeting the metrics port
    template: service.tpl
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 8081
            targetPort: metrics
            protocol: TCP

  - it: selects the exporter pods
    template: service.tpl
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: drm-exporter

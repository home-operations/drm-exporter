# cargo-deny configuration. Advisory in CI (the audit job is continue-on-error)
# but useful locally: `mise run audit` / `cargo deny check`.

[advisories]
version = 2
ignore = []

[licenses]
version = 2
# The first entry is this project's OWN license (declared AGPL-3.0-only in
# Cargo.toml); the rest are the permissive licenses accepted for dependencies.
allow = [
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# qmlib (the qmassa GPU stats library) is not published to crates.io and is
# pinned to an exact revision in Cargo.toml.
allow-git = ["https://github.com/ulissesf/qmassa"]

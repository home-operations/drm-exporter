---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image

# Build the container image and smoke-test it whenever a build input changes.
# The smoke run is the guard for the runtime shared-library closure (the binary
# links libudev + libcap, copied into the distroless runtime): a missing or
# broken .so makes the dynamic loader abort at startup, which this catches on the
# PR instead of at release time.
on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - src/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/image.yaml
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - src/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/image.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Build + Smoke
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The builder stage installs pkg-config + libudev-dev itself, so the runner
      # only needs Docker (preinstalled, BuildKit on by default).
      - name: Build image
        run: docker build -t drm-exporter:smoke .

      - name: Smoke test (verifies the runtime library closure loads)
        run: |
          # `--version` forces the dynamic loader to resolve every NEEDED .so
          # (libudev, libcap, glibc, libgcc) before main runs — a missing lib
          # aborts here with "error while loading shared libraries".
          docker run --rm drm-exporter:smoke --version

          # With no GPU on the runner a full run must still reach the device
          # probe (proving libudev loaded + telemetry initialized), then exit
          # with the expected error — not die in the loader.
          out="$(docker run --rm drm-exporter:smoke 2>&1 || true)"
          echo "${out}"
          echo "${out}" | grep -q 'no DRM GPU devices found' \
            || { echo '::error::exporter failed before the device probe — runtime library closure likely broken'; exit 1; }
